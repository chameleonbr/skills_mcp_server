services:
  skills-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_VERSION=20
    container_name: skills-mcp-server
    ports:
      - "8000:8000"
    volumes:
      # Persistent named volume for skills storage (survives container restarts)
      - skills_data:/app/skills
      # Uncomment below for local development with hot-reload:
      # - .:/app
      # - /app/.venv
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      # Override SKILLS_DIR to point to the mounted volume path
      - SKILLS_DIR=/app/skills
    command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips", "*"]

volumes:
  skills_data:
    driver: local
